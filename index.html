<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Kerentanan Wilayah jawa Tengah</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        <div class="map-panel">
            <h2>Peta Kerentanan DBD & Kemiskinan (2016-2025)</h2>
            
            <div class="slider-container">
                <label for="yearSlider">Tahun: <span id="yearLabel">2019</span></label>
                <input type="range" id="yearSlider" min="2016" max="2025" value="2016" step="1">
            </div>

            <div id="map"></div>
        </div>

        <div class="stats-panel">
            <h3>Statistik Ringkas</h3>
            <div id="summary-cards">
                </div>
            
            <div class="chart-container">
                <canvas id="barChart"></canvas>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
